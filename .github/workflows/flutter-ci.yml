name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter-build:
    name: Install & Analyze Flutter
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: employme_flutter
        run: flutter pub get

      - name: Analyze code
        working-directory: employme_flutter
        run: flutter analyze

      - name: Run tests
        working-directory: employme_flutter
        run: flutter test --no-pub
