name: employme_flutter
description: EmployMe — Hyperlocal Jobs for All. Flutter mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  google_fonts: ^8.0.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Location & Maps
  geolocator: ^14.0.2
  google_maps_flutter: ^2.9.0

  # Real-time chat
  socket_io_client: ^2.0.3+1

  # Local storage & offline support
  sqflite: ^2.3.3+1
  shared_preferences: ^2.3.2

  # Media & permissions
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  dio: ^5.7.0
  freezed_annotation: ^2.4.4
  http: ^1.6.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.13
  freezed: ^2.5.7

flutter:
  uses-material-design: true
